services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  rag-api:
    build: .
    ports: ["8000:8000"]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    depends_on: [qdrant, redis]
